<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>PanelStatX Cinematic Launch</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0f1320, #05070b);
    color: #e2e8f4;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Background glow animation */
.bg {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,229,200,0.1), transparent 60%);
    animation: move 20s infinite alternate ease-in-out;
}
@keyframes move {
    from { transform: translate(-10%, -10%) scale(1); }
    to { transform: translate(10%, 10%) scale(1.2); }
}

/* Scene */
.scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(1.1);
    transition: all 1.2s ease;
    text-align: center;
    padding: 60px;
}
.scene.active {
    opacity: 1;
    transform: scale(1);
}

/* Typography */
h1 {
    font-size: 72px;
    margin: 0;
    letter-spacing: -2px;
}
p {
    font-size: 26px;
    max-width: 900px;
    color: #8b9bb8;
    margin-top: 20px;
}

/* Glow */
.accent {
    color: #00e5c8;
    text-shadow: 0 0 25px rgba(0,229,200,0.7);
}

/* Typewriter */
.type {
    border-right: 2px solid #00e5c8;
    white-space: nowrap;
    overflow: hidden;
}

/* AI pulse */
.ai-box {
    margin-top: 30px;
    padding: 20px 30px;
    border: 1px solid rgba(0,229,200,0.3);
    background: rgba(0,229,200,0.05);
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0% { box-shadow: 0 0 0px rgba(0,229,200,0.2); }
    50% { box-shadow: 0 0 30px rgba(0,229,200,0.4); }
    100% { box-shadow: 0 0 0px rgba(0,229,200,0.2); }
}

/* Overlay transition */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    transition: opacity 0.8s;
}

/* Button */
.play {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 16px 32px;
    border: 1px solid #00e5c8;
    color: #00e5c8;
    cursor: pointer;
}
.play:hover {
    background: #00e5c8;
    color: black;
}
</style>

</head>

<body>

<div class="bg"></div>
<div id="overlay" class="overlay"></div>

<!-- Scenes -->

<div class="scene active">
    <h1>⬡ <span class="accent">PanelStatX</span></h1>
    <p class="type" id="t1"></p>
</div>

<div class="scene">
    <h1>The Problem</h1>
    <p class="type" id="t2"></p>
</div>

<div class="scene">
    <h1>The Shift</h1>
    <p class="type" id="t3"></p>
</div>

<div class="scene">
    <h1>Core Engine</h1>
    <p class="type" id="t4"></p>
</div>

<div class="scene">
    <h1 class="accent">AI Thinking...</h1>
    <div class="ai-box">
        <p class="type" id="t5"></p>
    </div>
</div>

<div class="scene">
    <h1>Automation</h1>
    <p class="type" id="t6"></p>
</div>

<div class="scene">
    <h1>From Data → Insight</h1>
    <p class="type" id="t7"></p>
</div>

<div class="scene">
    <h1>⬡ <span class="accent">PanelStatX</span></h1>
    <p class="type" id="t8"></p>
</div>

<div class="play" onclick="start()">▶ Play Cinematic Launch</div>

<script>
const texts = [
"The future of panel data analysis has arrived.",
"Panel data is powerful, but complex, technical, and time consuming.",
"What if everything became instant, intuitive, and intelligent?",
"Run fixed effects, random effects, and diagnostics in seconds.",
"Analyzing regression outputs... generating interpretation...",
"Automated reports, credit system, seamless workflow.",
"Upload data. Run models. Extract insight instantly.",
"Analyze faster. Understand deeper. Publish smarter."
];

const scenes = document.querySelectorAll(".scene");
let current = 0;
let playing = false;

/* Typewriter */
function typeText(el, text) {
    el.innerHTML = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 28);
        }
    }
    typing();
}

/* Voice */
function speak(text) {
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 0.9;
    window.speechSynthesis.speak(speech);
}

/* Scene */
function showScene(i) {
    scenes.forEach(s => s.classList.remove("active"));
    scenes[i].classList.add("active");

    const el = document.getElementById("t" + (i+1));
    typeText(el, texts[i]);
    speak(texts[i]);
}

/* Cinematic transition */
function transition(next) {
    const overlay = document.getElementById("overlay");
    overlay.style.opacity = 0.7;

    setTimeout(() => {
        next();
        overlay.style.opacity = 0;
    }, 500);
}

/* Player */
function start() {
    if (playing) return;
    playing = true;
    current = 0;

    function next() {
        if (current >= scenes.length) return;

        transition(() => showScene(current));

        current++;
        setTimeout(next, 7000);
    }

    next();
}
</script>

</body>
</html>
