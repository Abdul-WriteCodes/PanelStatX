<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>PanelStatX Cinematic Launch</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0f1320, #05070b);
    color: #e2e8f4;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Background animation */
.bg {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,229,200,0.08), transparent 60%);
    animation: drift 20s linear infinite;
}

@keyframes drift {
    from { transform: translate(-10%, -10%); }
    to { transform: translate(10%, 10%); }
}

.scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(1.05);
    transition: all 1.2s ease;
    text-align: center;
    padding: 40px;
}

.active {
    opacity: 1;
    transform: scale(1);
}

h1 {
    font-size: 70px;
    margin: 0;
    letter-spacing: -2px;
}

p {
    font-size: 24px;
    max-width: 900px;
    color: #8b9bb8;
    margin-top: 20px;
    line-height: 1.6;
}

/* Glow accent */
.accent {
    color: #00e5c8;
    text-shadow: 0 0 20px rgba(0,229,200,0.5);
}

/* Typewriter */
.type {
    border-right: 2px solid #00e5c8;
    white-space: nowrap;
    overflow: hidden;
}

/* Button */
.play {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 28px;
    border: 1px solid #00e5c8;
    color: #00e5c8;
    cursor: pointer;
    transition: 0.3s;
}

.play:hover {
    background: #00e5c8;
    color: #000;
}
</style>

</head>

<body>

<div class="bg"></div>

<!-- Scenes -->

<div class="scene active">
    <h1>⬡ <span class="accent">PanelStatX</span></h1>
    <p class="type" id="t1"></p>
</div>

<div class="scene">
    <h1>The Problem</h1>
    <p class="type" id="t2"></p>
</div>

<div class="scene">
    <h1>The Shift</h1>
    <p class="type" id="t3"></p>
</div>

<div class="scene">
    <h1>Core Power</h1>
    <p class="type" id="t4"></p>
</div>

<div class="scene">
    <h1 class="accent">AI Interpretation</h1>
    <p class="type" id="t5"></p>
</div>

<div class="scene">
    <h1>Automation</h1>
    <p class="type" id="t6"></p>
</div>

<div class="scene">
    <h1>From Data → Insight</h1>
    <p class="type" id="t7"></p>
</div>

<div class="scene">
    <h1>⬡ <span class="accent">PanelStatX</span></h1>
    <p class="type" id="t8"></p>
</div>

<div class="play" onclick="start()">▶ Launch Video</div>

<script>
const texts = [
    "The future of panel data analysis has arrived.",
    "Panel data is powerful... but complex, technical, and time-consuming.",
    "What if everything became instant, intuitive, and intelligent?",
    "Run fixed effects, random effects, diagnostics — in seconds.",
    "Get AI-powered explanations that sound like a published research paper.",
    "Automated reports. Built-in credit system. Zero friction workflow.",
    "Upload your data. Run models. Extract insight instantly.",
    "Analyze faster. Understand deeper. Publish smarter."
];

let scenes = document.querySelectorAll(".scene");

function typeText(element, text, speed=30) {
    element.innerHTML = "";
    let i = 0;

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 0.92;
    speech.pitch = 1;
    speech.volume = 1;
    window.speechSynthesis.speak(speech);
}

function start() {
    let i = 0;

    function next() {
        if (i >= scenes.length) return;

        scenes.forEach(s => s.classList.remove("active"));
        scenes[i].classList.add("active");

        let textEl = document.getElementById("t" + (i+1));
        typeText(textEl, texts[i]);
        speak(texts[i]);

        i++;
        setTimeout(next, 6500);
    }

    next();
}
</script>

</body>
</html>
